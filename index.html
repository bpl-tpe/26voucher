.chevron.open{transform:rotate(90deg)}

<script>
const STORES_INIT=[
  {id:'s01',name:'淡然曙光 自烘咖啡館',ranges:[[481,570]]},
  {id:'s02',name:'甘心咖啡 GanXinCoffee',ranges:[[571,660]]},

  {id:'s07',name:'富特士多早餐店 FOOTD STORE',ranges:[[661,720]]},
  {id:'s08',name:'春桃手作厚工甜品',ranges:[[721,780]]},
  {id:'s09',name:'小馬轉轉',ranges:[[781,840]]},
  {id:'s10',name:'陳師傅足體養生館',ranges:[[1111,1170]]},
  {id:'s11',name:'tokyobike cafe',ranges:[[1171,1230]]},
  {id:'s12',name:'愛嬌青春製冰室',ranges:[[1231,1320]]},
  {id:'s13',name:'多餃舍',ranges:[[1321,1380]]},
  {id:'s14',name:'三水食品花生行',ranges:[[1381,1440]]},
  {id:'s15',name:'飛地nowhere',ranges:[[211,240]]},
  {id:'s16',name:'永富冰淇淋',ranges:[[841,930]]},
  {id:'s17',name:'天天旗袍體驗館',ranges:[[931,990]]},
  {id:'s18',name:'樂福蛋糕 Love Cake-萬華店',ranges:[[1441,1500],[2341,2370]]},
  {id:'s19',name:'豬血幫&米血糕',ranges:[[1501,1560]]},
  {id:'s20',name:'胡椒餅烤地瓜',ranges:[[1561,1650]]},
  {id:'s21',name:'豬飽飽雞蛋糕',ranges:[[1651,1740]]},
  {id:'s22',name:'老明玉香舖',ranges:[[241,270]]},
  {id:'s23',name:'福大同茶莊',ranges:[[271,330]]},
  {id:'s24',name:'台北堂餅行摩那卡餅（最中餅）本舖',ranges:[[331,390]]},
  {id:'s25',name:'時報本舖書店',ranges:[[391,450]]},
  {id:'s26',name:'新富町文化市場',ranges:[[1741,1800]]},
  {id:'s27',name:'金海峰實業有限公司',ranges:[[1801,1860]]},
  {id:'s28',name:'旺旺屋',ranges:[[451,480]]},
  {id:'s29',name:'西門紅樓選品',ranges:[[31,90]]},
  {id:'s30',name:'萬味福利社',ranges:[[1861,1920]]},
  {id:'s31',name:'莽葛拾遺二手書店',ranges:[[1921,1980]]},
  {id:'s32',name:'二和珍傳統餅舖',ranges:[[1981,2040]]},
  {id:'s33',name:'豐生蔘藥行',ranges:[[2041,2070]]},
];

let stores=JSON.parse(JSON.stringify(STORES_INIT));
let collected={};
let missing={};
let openStores=new Set();

function pad(n){return String(n).padStart(4,'0');}
function formatDisp(d){return d?d.replace(/^(\d{4})-(\d{2})-(\d{2})$/,'$1/$2/$3'):'';}
function totalAllocated(){return stores.reduce((s,st)=>s+st.ranges.reduce((a,[f,t])=>a+(t-f+1),0),0);}
function findStore(sn){const n=parseInt(sn,10);if(isNaN(n))return null;for(const s of stores)for(const[f,t]of s.ranges)if(n>=f&&n<=t)return s;return null;}
function getMissByStore(sid){return Object.values(missing).filter(m=>m.sid===sid).reduce((s,m)=>s+(m.count||1),0);}
function getStoreCounts(){const c={};stores.forEach(s=>c[s.id]=0);Object.keys(collected).forEach(k=>{const s=findStore(parseInt(k,10));if(s)c[s.id]++;});return c;}
function getStoreCollected(sid){return Object.entries(collected).filter(([k])=>{const s=findStore(parseInt(k,10));return s&&s.id===sid;}).sort((a,b)=>a[0].localeCompare(b[0]));}
function groupByDate(entries){
  const map=new Map();
  for(const[k,v]of entries){const d=v.date||'（未設定日期）';if(!map.has(d))map.set(d,[]);map.get(d).push(k);}
  return[...map.entries()].sort((a,b)=>b[0].localeCompare(a[0])).map(([date,keys])=>({date,keys:keys.sort()}));
}

function updateMetrics(){
  const total=Object.keys(collected).length;
  const missTotal=Object.values(missing).reduce((s,m)=>s+(m.count||1),0);
  const counts=getStoreCounts();
  document.getElementById('m-grand').textContent=total+missTotal;
  document.getElementById('m-total').textContent=total;
  document.getElementById('m-stores').textContent=stores.filter(s=>counts[s.id]>0||getMissByStore(s.id)>0).length;
  document.getElementById('m-rate').textContent=Math.round(total/totalAllocated()*100)+'%';
  document.getElementById('m-miss').textContent=missTotal;
}

function toggleStore(sid){openStores.has(sid)?openStores.delete(sid):openStores.add(sid);renderStatList();}

function renderStatList(){
  const counts=getStoreCounts();
  const rows=stores.map(s=>({...s,count:counts[s.id]||0,missCount:getMissByStore(s.id)}))
    .filter(r=>r.count>0||r.missCount>0).sort((a,b)=>(b.count+b.missCount)-(a.count+a.missCount));
  const el=document.getElementById('stat-list');
  if(!rows.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:#9ca3af;font-size:13px">尚無回收資料</div>';return;}
  const max=Math.max(...rows.map(r=>r.count+r.missCount),1);
  el.innerHTML=rows.map(r=>{
    const alloc=r.ranges.reduce((a,[f,t])=>a+(t-f+1),0);
    const total=Object.keys(collected).length;
    const pct=total>0?Math.round(r.count/total*100):0;
    const isOpen=openStores.has(r.id);
    const snEntries=getStoreCollected(r.id);
    const groups=groupByDate(snEntries);
    const missList=Object.entries(missing).filter(([,m])=>m.sid===r.id).sort((a,b)=>b[1].date.localeCompare(a[1].date));
    const snGroupsHtml=groups.length?groups.map(g=>`<div class="date-group">
      <div class="date-group-label">📅 ${formatDisp(g.date)||g.date}<span class="cnt">· ${g.keys.length} 筆</span></div>
      <div class="sn-grid">${g.keys.map(k=>`<span class="sn-chip">${k}</span>`).join('')}</div>
    </div>`).join(''):'<span class="empty-txt">尚無回收紀錄</span>';
    return `<div class="stat-row">
      <div class="stat-main" onclick="toggleStore('${r.id}')">
        <span class="chevron ${isOpen?'open':''}">▶</span>
        <span class="sname"><span class="sname-full">${r.name}</span><span class="sname-short">${[...r.name].slice(0,3).join('')}…</span></span>
        <span class="salloc">${alloc}</span>
        <span class="scnt">${r.count}</span>
        <span class="smiss" style="${r.missCount>0?'':'color:#9ca3af;font-weight:400'}">${r.missCount>0?r.missCount:'－'}</span>
        <span style="font-size:11px;color:#9ca3af;font-weight:400;text-align:right">${pct}%</span>
        <div style="padding:0 2px"><div style="height:5px;background:#e5e3db;border-radius:99px;overflow:hidden"><div style="height:100%;border-radius:99px;background:#9ca3af;width:${Math.round((r.count+r.missCount)/max*100)}%;transition:width .3s"></div></div></div>
      </div>
      <div class="stat-detail ${isOpen?'open':''}">
        <div class="detail-sec">
          <div class="detail-title">流水號範圍</div>
          <div>${r.ranges.map(([f,t])=>`<span class="range-chip">${pad(f)}–${pad(t)}</span>`).join('')}</div>
        </div>
        <div class="detail-sec">
          <div class="detail-title">已回收流水號（${snEntries.length} 筆）</div>
          ${snGroupsHtml}
        </div>
        ${missList.length?`<div class="detail-sec">
          <div class="detail-title" style="color:#b45309">遺漏券登記（${missList.reduce((s,[,m])=>s+(m.count||1),0)} 筆）</div>
          <div>${missList.map(([,m])=>{
            const pc=m.proof==='收據'?'proof-receipt':'proof-none';
            const pi=m.proof==='收據'?'🧾':'❌';
            return `<span class="miss-chip">⚠️ ${formatDisp(m.date)} <span class="proof-chip ${pc}">${pi} ${m.proof||'—'}</span> <span style="font-weight:600">${m.count||1}筆</span></span>`;
          }).join('')}</div>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderMissList(){
  const el=document.getElementById('miss-list');
  const all=Object.entries(missing);
  if(!all.length){el.innerHTML='<p style="font-size:13px;color:#9ca3af;font-style:italic">尚無遺漏券登記</p>';return;}
  const dates=[...new Set(all.map(([,m])=>m.date||'（未設定日期）'))].sort((a,b)=>b.localeCompare(a));
  const sel=document.getElementById('miss-date-filter');
  const selectedDate=sel?sel.value:'';
  const totalAll=Object.values(missing).reduce((s,m)=>s+(m.count||1),0);
  const filtered=selectedDate?all.filter(([,m])=>(m.date||'（未設定日期）')===selectedDate).sort((a,b)=>a[1].name.localeCompare(b[1].name,'zh-TW')):[];
  el.innerHTML=`
    <div class="date-filter-row">
      <label>📅 查看日期</label>
      <select id="miss-date-filter" onchange="renderMissList()">
        <option value="">— 選擇日期 —</option>
        ${dates.map(d=>{
          const dt=all.filter(([,m])=>(m.date||'（未設定日期）')===d).reduce((s,[,m])=>s+(m.count||1),0);
          return `<option value="${d}" ${d===selectedDate?'selected':''}>${formatDisp(d)||d}（${dt} 筆）</option>`;
        }).join('')}
      </select>
      <span class="total-cnt">共 ${totalAll} 筆</span>
    </div>
    ${!selectedDate
      ? '<p style="font-size:13px;color:#9ca3af;font-style:italic">請選擇日期以查看資料</p>'
      : filtered.length
        ? `<div style="border:1px solid #e5e3db;border-radius:8px;overflow:hidden">
            ${filtered.map(([,m])=>{
              const pc=m.proof==='收據'?'proof-receipt':'proof-none';
              const pi=m.proof==='收據'?'🧾':'❌';
              return `<div class="miss-list-item">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0">
                  <span style="font-size:13px">${m.name}</span>
                  <span class="proof-chip ${pc}">${pi} ${m.proof||'—'}</span>
                  <span style="font-size:12px;font-weight:600;color:#1a1a18;background:#f0ede8;border:1px solid #d1d0c8;border-radius:4px;padding:1px 8px">${m.count||1} 筆</span>
                </div>
              </div>`;
            }).join('')}
          </div>`
        : '<p style="font-size:13px;color:#9ca3af;font-style:italic">此日期無登記資料</p>'
    }`;
}

function renderDailyList(){
  const el=document.getElementById('daily-list');
  if(!el)return;
  const dateMap=new Map();
  Object.entries(collected).forEach(([k,v])=>{
    const d=v.date||'（未設定日期）';
    if(!dateMap.has(d))dateMap.set(d,{sns:[],missing:[]});
    const store=findStore(parseInt(k,10));
    dateMap.get(d).sns.push({key:k,storeName:store?store.name:'未知店家'});
  });
  Object.entries(missing).forEach(([mid,m])=>{
    const d=m.date||'（未設定日期）';
    if(!dateMap.has(d))dateMap.set(d,{sns:[],missing:[]});
    dateMap.get(d).missing.push({mid,m});
  });
  if(!dateMap.size){el.innerHTML='<div style="text-align:center;padding:2rem;color:#9ca3af;font-size:13px">尚無資料</div>';return;}
  const dates=[...dateMap.keys()].sort((a,b)=>b.localeCompare(a));
  const sel=document.getElementById('daily-date-filter');
  const selectedDate=sel?sel.value:'';
  const totalAll=[...dateMap.values()].reduce((s,d)=>s+d.sns.length+d.missing.reduce((a,x)=>a+(x.m.count||1),0),0);

  el.innerHTML=`
    <div class="date-filter-row">
      <label>📅 查看日期</label>
      <select id="daily-date-filter" onchange="renderDailyList()">
        <option value="">— 選擇日期 —</option>
        ${dates.map(d=>{const dd=dateMap.get(d);const cnt=dd.sns.length+dd.missing.reduce((a,x)=>a+(x.m.count||1),0);return`<option value="${d}" ${d===selectedDate?'selected':''}>${formatDisp(d)||d}（${cnt} 筆）</option>`;}).join('')}
      </select>
      <span class="total-cnt">共 ${totalAll} 筆</span>
    </div>
    ${!selectedDate ? '<p style="font-size:13px;color:#9ca3af;font-style:italic">請選擇日期以查看資料</p>' : (()=>{
      const data=dateMap.get(selectedDate);
      if(!data) return '<p style="font-size:13px;color:#9ca3af;font-style:italic">此日期無資料</p>';
      const storeSnMap=new Map();
      data.sns.forEach(({key,storeName})=>{if(!storeSnMap.has(storeName))storeSnMap.set(storeName,[]);storeSnMap.get(storeName).push(key);});
      return `
        ${data.sns.length?`<div style="margin-bottom:14px">
          <div style="font-size:11px;font-weight:600;color:#6b6b67;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px">流水號明細（${data.sns.length} 筆）</div>
          ${[...storeSnMap.entries()].map(([sn,keys])=>`<div style="margin-bottom:10px"><div style="font-size:12px;color:#6b6b67;margin-bottom:4px">${sn}</div><div class="sn-grid">${keys.sort().map(k=>`<span class="sn-chip">${k}</span>`).join('')}</div></div>`).join('')}
        </div>`:''}
        ${data.missing.length?`<div>
          <div style="font-size:11px;font-weight:600;color:#b45309;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px">遺漏券明細（${data.missing.reduce((a,x)=>a+(x.m.count||1),0)} 筆）</div>
          <div style="border:1px solid #e5e3db;border-radius:8px;overflow:hidden">
            ${data.missing.map(({m})=>{const pc=m.proof==='收據'?'proof-receipt':'proof-none';const pi=m.proof==='收據'?'🧾':'❌';return`<div class="miss-list-item"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0"><span style="font-size:13px">${m.name}</span><span class="proof-chip ${pc}">${pi} ${m.proof||'—'}</span><span style="font-size:12px;font-weight:600;background:#f0ede8;border:1px solid #d1d0c8;border-radius:4px;padding:1px 8px">${m.count||1} 筆</span></div></div>`;}).join('')}
          </div>
        </div>`:''}`;
    })()}`;
}

function populateStoreSelects(){
  const sorted=[...stores].sort((a,b)=>a.name.localeCompare(b.name,'zh-TW'));
  document.getElementById('mgmt-store-select').innerHTML='<option value="">— 選擇店家 —</option>'+sorted.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function renderStorePanel(){
  const sid=document.getElementById('mgmt-store-select').value;
  const panel=document.getElementById('store-detail-panel');
  if(!sid){panel.style.display='none';return;}
  const s=stores.find(x=>x.id===sid);
  const alloc=s.ranges.reduce((a,[f,t])=>a+(t-f+1),0);
  const dayMap=new Map();
  Object.entries(collected).forEach(([k,v])=>{const st=findStore(parseInt(k,10));if(!st||st.id!==sid)return;const d=v.date||'（未設定日期）';if(!dayMap.has(d))dayMap.set(d,{sns:[],missCount:0});dayMap.get(d).sns.push(k);});
  Object.values(missing).forEach(m=>{if(m.sid!==sid)return;const d=m.date||'（未設定日期）';if(!dayMap.has(d))dayMap.set(d,{sns:[],missCount:0});dayMap.get(d).missCount+=(m.count||1);});
  const sortedDays=[...dayMap.entries()].sort((a,b)=>b[0].localeCompare(a[0]));
  panel.style.display='block';
  panel.innerHTML=`<div style="background:#f5f4f0;border-radius:10px;padding:14px">
    <div style="font-size:14px;font-weight:600;margin-bottom:10px">${s.name}</div>
    <div style="font-size:12px;color:#6b6b67;margin-bottom:6px">流水號範圍 <span style="color:#9ca3af">（共 ${alloc} 張）</span></div>
    <div style="margin-bottom:14px">${s.ranges.map(([f,t])=>`<span style="display:inline-block;background:#fff;border:1px solid #e5e3db;border-radius:4px;padding:2px 8px;font-family:monospace;font-size:12px;color:#6b6b67;margin:2px">${pad(f)}–${pad(t)}</span>`).join('')}</div>
    <div style="font-size:12px;color:#6b6b67;margin-bottom:8px">各日兌換紀錄</div>
    ${sortedDays.length?sortedDays.map(([date,data])=>`<div style="border:1px solid #e5e3db;border-radius:8px;overflow:hidden;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f5f4f0;border-bottom:${data.sns.length?'1px':'0'} solid #e5e3db">
        <span style="font-size:12px;font-weight:600">📅 ${formatDisp(date)||date}</span>
        <div style="display:flex;gap:6px">
          ${data.sns.length?`<span style="font-size:11px;background:#e5e3db;border-radius:4px;padding:1px 7px">流水號 ${data.sns.length} 筆</span>`:''}
          ${data.missCount?`<span style="font-size:11px;background:#fef3c7;border:1px solid #f59e0b;border-radius:4px;padding:1px 7px;color:#92400e">遺漏 ${data.missCount} 筆</span>`:''}
        </div>
      </div>
      ${data.sns.length?`<div style="padding:8px 12px"><div class="sn-grid">${data.sns.sort().map(k=>`<span class="sn-chip">${k}</span>`).join('')}</div></div>`:''}
    </div>`).join(''):'<p style="font-size:13px;color:#9ca3af;font-style:italic">尚無兌換紀錄</p>'}
  </div>`;
}

function switchTab(t){
  ['daily','missing','stores'].forEach(id=>{const el=document.getElementById('tab-'+id);if(el)el.style.display=id===t?'':'none';});
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='daily')||(i===1&&t==='missing')||(i===2&&t==='stores')));
  if(t==='missing')renderMissList();
  if(t==='daily')renderDailyList();
  if(t==='stores'){populateStoreSelects();renderStorePanel();}
}

function exportCSV(){
  const counts=getStoreCounts();
  const rows=[['店家名稱','流水號範圍','配發張數','回收數量','遺漏券登記','回收率','已回收流水號（含回收日期）','遺漏日期','憑證類型']];
  stores.forEach(s=>{
    const alloc=s.ranges.reduce((a,[f,t])=>a+(t-f+1),0);
    const cnt=counts[s.id]||0;
    const missCount=getMissByStore(s.id);
    const rangeStr=s.ranges.map(([f,t])=>pad(f)+'-'+pad(t)).join(' + ');
    const snStr=getStoreCollected(s.id).map(([k,v])=>v.date?`${k}(${v.date})`:k).join(' ');
    const missEntries=Object.values(missing).filter(m=>m.sid===s.id);
    const missDates=missEntries.map(m=>m.date).join(' ');
    const missProofs=missEntries.map(m=>m.proof||'—').join(' ');
    rows.push([s.name,rangeStr,alloc,cnt,missCount,alloc?Math.round(cnt/alloc*100)+'%':'0%',snStr,missDates,missProofs]);
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='消費證明券統計（封存）.csv';a.click();
}

function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.database();
    db.ref('.info/connected').on('value',snap=>{
      const ok=!!snap.val();
      const dot=document.getElementById('sync-dot');
      const lbl=document.getElementById('sync-label');
      dot.className='sync-dot'+(ok?' ok':' err');
      lbl.textContent=ok?'即時同步中':'離線中';
    });
    db.ref('collected').on('value',snap=>{
      collected=snap.val()||{};
      renderStatList();renderDailyList();updateMetrics();
      if(document.getElementById('tab-stores').style.display!=='none')renderStorePanel();
    });
    db.ref('missing').on('value',snap=>{
      missing=snap.val()||{};
      renderStatList();renderMissList();renderDailyList();updateMetrics();
      if(document.getElementById('tab-stores').style.display!=='none')renderStorePanel();
    });
    db.ref('stores').on('value',snap=>{
      const data=snap.val();
      if(data){stores=data;populateStoreSelects();renderStatList();updateMetrics();}
    });
  }catch(e){console.error('Firebase error:',e);}
}

populateStoreSelects();renderStatList();updateMetrics();renderDailyList();
initFirebase();
</script>
</body>
</html>
